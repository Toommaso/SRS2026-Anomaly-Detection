# =============================================================================
# EMQX Open Source - values.yaml
# Chart: emqx/emqx
# Target: cluster Kubernetes 2 nodi, architettura arm64
# Clustering nativo K8s (no bridge, no loop)
# =============================================================================

replicaCount: 2   # dispari consigliato (3)

image:
  repository: emqx/emqx
  tag: "5.8"      # ultima versione stabile OSS
  pullPolicy: IfNotPresent

# Clustering automatico via K8s API
emqxConfig:
  EMQX_CLUSTER__DISCOVERY_STRATEGY: k8s
  EMQX_CLUSTER__K8S__APISERVER: "https://kubernetes.default.svc:443"
  EMQX_CLUSTER__K8S__SERVICE_NAME: emqx-headless
  EMQX_CLUSTER__K8S__ADDRESS_TYPE: hostname
  EMQX_CLUSTER__K8S__SUFFIX: "svc.cluster.local"
  EMQX_CLUSTER__K8S__NAMESPACE: factory

  # Disabilita autenticazione
  EMQX_ALLOW_ANONYMOUS: "true"

  # Retained messages
  EMQX_RETAINER__ENABLE: "true"
  EMQX_RETAINER__BACKEND__TYPE: built_in_database
  EMQX_RETAINER__BACKEND__STORAGE_TYPE: ram   # non persiste su disco, pulito a ogni restart

resources:
  requests:
    cpu: "50m"
    memory: "128Mi"
  limits:
    cpu: "250m"
    memory: "512Mi"

# Persistenza per dati cluster
persistence:
  enabled: false
  storageClass: local-path
  size: 1Gi

service:
  type: ClusterIP

# Porte esposte
ports:
  mqtt: 1883
  ws: 8083

# Anti-affinity: 1 broker per nodo fisico
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - emqx
          topologyKey: kubernetes.io/hostname

# ServiceAccount necessario per il discovery K8s
serviceAccount:
  create: true

# PodDisruptionBudget: almeno 1 broker sempre disponibile
podDisruptionBudget:
  enabled: true
  minAvailable: 1