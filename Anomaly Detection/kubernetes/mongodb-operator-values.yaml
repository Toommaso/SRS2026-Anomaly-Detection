# =============================================================================
# Chart: percona/psmdb-operator
#
# Installa il controller che gestisce il ciclo di vita del cluster MongoDB.
# È cluster-scoped: un singolo operator può gestire più cluster in namespace diversi.
# =============================================================================

replicaCount: 1

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

watchNamespace: "factory"